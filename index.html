<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="quiz-container">
        <header class="quiz-header">
            <h1>Mission: Mars Quiz</h1>
            <div class="score-board">Score: <span id="score">0</span></div>
        </header>

        <main class="quiz-body">
            <!-- Текстова заглушка замість картинки -->
            <div class="quiz-visual-box">
                <div class="mars-placeholder">🪐</div>
            </div>

            <h2 id="question">What is the nickname of Mars?</h2>

            <div class="options-container">
                <button class="option-btn">The Blue Planet</button>
                <button class="option-btn correct">The Red Planet</button>
                <button class="option-btn">The Golden Planet</button>
                <button class="option-btn">The Ringed Planet</button>
            </div>
        </main>

        <footer class="quiz-footer">
            <button id="next-btn" class="control-btn">Next Question</button>
        </footer>
    </div>

</body>
</html>
