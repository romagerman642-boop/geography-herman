<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Continents & Oceans Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Анімований задній фон (хвилі) -->
    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="quiz-container">
        <!-- Екран гри -->
        <div id="quiz-screen">
            <h1>Continents & Oceans</h1>
            <div class="progress" id="progress">Question 1 of 15</div>
            <div class="question" id="question-text">Question text goes here?</div>
            <div class="answers-block" id="answers-block">
                <!-- Кнопки створюються через JS -->
            </div>
            <button class="next-btn" id="next-button">Next Question</button>
        </div>

        <!-- Екран результатів -->
        <div id="results-screen" class="hide">
            <h1>Quiz Completed!</h1>
            <div class="results-score" id="score-text">You scored 0 out of 15</div>
            <p class="feedback-msg" id="feedback-msg">Awesome job!</p>
            <button class="restart-btn" id="restart-button">Restart Quiz</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
