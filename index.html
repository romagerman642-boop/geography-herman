<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мега-Квіз: Материки та Океани</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Анімований задній фон (хвилі) -->
    <div class="ocean">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="quiz-container">
        <!-- Екран гри -->
        <div id="quiz-screen">
            <h1>Материки та Океани</h1>
            <div class="progress" id="progress">Запитання 1 з 15</div>
            <div class="question" id="question-text">Тут буде текст запитання?</div>
            <div class="answers-block" id="answers-block">
                <!-- Кнопки створюються через JavaScript -->
            </div>
            <button class="next-btn" id="next-button">Наступне запитання</button>
        </div>

        <!-- Екран результатів -->
        <div id="results-screen" class="hide">
            <h1>Квіз завершено!</h1>
            <div class="results-score" id="score-text">Твій результат: 0 з 15</div>
            <p class="feedback-msg" id="feedback-msg">Чудова робота!</p>
            <button class="restart-btn" id="restart-button">Пройти знову</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
