<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Океанічний Квіз</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="water-container"></div>

    <div class="app-container">
        <div id="start-screen">
            <h1>Океанічний квіз</h1>
            <p>Готовий підкорити морські глибини?</p>
            <button id="start-btn">ПОГНАЛИ!</button>
        </div>

        <div id="quiz-screen" class="hide">
            <div class="header">
                <span id="timer">Час: 25</span>
                <span id="score-display">Бали: 0</span>
            </div>
            <h2 id="question-text">Запитання...</h2>
            <div id="answers-container"></div>
        </div>

        <div id="result-screen" class="hide">
            <h2>Результат</h2>
            <p class="result-text"></p>
            <p>Твій рахунок: <span id="final-score">0</span></p>
            <button id="restart-btn">СПРОБУВАТИ ЗНОВУ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
